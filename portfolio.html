    <style>
        /* 系列卡片样式 */
        .series-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .series-card {
            background: #fff;
            border: 2px solid #1a1a1a;
            border-radius: 0;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        
        .series-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 32px rgba(0,0,0,0.15);
        }
        
        .series-cover {
            position: relative;
            height: 240px;
            overflow: hidden;
        }
        
        .series-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .series-card:hover .series-cover img {
            transform: scale(1.05);
        }
        
        .series-info {
            padding: 1.5rem;
        }
        
        .series-name {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            color: #1a1a1a;
        }
        
        .series-photo-count {
            font-size: 0.9rem;
            font-weight: 700;
            color: #6c6c6c;
            margin-bottom: 0.75rem;
            letter-spacing: 1px;
        }
        
        .series-description {
            font-size: 0.85rem;
            color: #4a4a4a;
            line-height: 1.5;
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        /* 系列详情页样式 */
        .series-detail {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .series-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .series-title {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        
        .series-meta {
            font-size: 1rem;
            font-weight: 700;
            color: #6c6c6c;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
        }
        
        .series-description-full {
            font-size: 1rem;
            color: #4a4a4a;
            line-height: 1.7;
            margin-bottom: 3rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            font-weight: 700;
        }
        
        .back-link {
            display: inline-block;
            background: #1a1a1a;
            color: white;
            padding: 0.8rem 2rem;
            text-decoration: none;
            font-weight: 900;
            border-radius: 0;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 2px solid #1a1a1a;
            margin-bottom: 2rem;
        }
        
        .back-link:hover {
            background: white;
            color: #1a1a1a;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        
        /* 图片预览模态框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.9);
        }
        
        .modal-content {
            margin: 10% auto;
            display: block;
            max-width: 90%;
            max-height: 80vh;
        }
        
        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .close:hover {
            color: #bbb;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .series-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            
            .series-cover {
                height: 200px;
            }
            
            .series-title {
                font-size: 2rem;
            }
        }
    </style>

        // 渲染系列卡片
        function renderSeries() {
            const container = document.getElementById('series-grid');
            if (!container) return;
            
            container.innerHTML = seriesData.map(series => `
                <div class="series-card" onclick="viewSeries('${series.id}')">
                    <div class="series-cover">
                        <img src="${series.cover}" alt="${series.name}" loading="lazy">
                    </div>
                    <div class="series-info">
                        <h3 class="series-name">${series.name}</h3>
                        <p class="series-photo-count">${series.photoCount}张照片</p>
                        <p class="series-description">${series.description}</p>
                    </div>
                </div>
            `).join('');
        }

        // 查看系列详情
        function viewSeries(seriesId) {
            const series = seriesData.find(s => s.id === seriesId);
            if (!series) return;
            
            // 创建系列详情页面内容
            const mainContent = document.querySelector('main');
            mainContent.innerHTML = `
                <div class="series-detail">
                    <a href="portfolio.html" class="back-link">返回系列列表</a>
                    <div class="series-header">
                        <h1 class="series-title">${series.name}</h1>
                        <p class="series-meta">${series.photoCount}张照片 · ${series.date}</p>
                        <p class="series-description-full">${series.description}</p>
                    </div>
                    <div class="gallery-grid">
                        ${series.photos.map(photo => `
                            <div class="gallery-item" onclick="openModal('${photo}')" style="cursor: pointer;">
                                <img src="${photo}" alt="${series.name}" loading="lazy">
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // 图片预览功能
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("modalImage");
        const closeBtn = document.getElementsByClassName("close")[0];
        
        // 打开预览
        function openModal(imgSrc) {
            modal.style.display = "block";
            modalImg.src = imgSrc;
        }
        
        // 关闭预览
        closeBtn.onclick = function() {
            modal.style.display = "none";
        }
        
        // 点击模态框外部关闭
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', () => {
            renderSeries();
        });
