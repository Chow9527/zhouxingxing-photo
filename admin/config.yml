backend:
  name: git-gateway
  branch: master

media_folder: "images/portfolio"
public_folder: "/images/portfolio"
media_library:
  name: uploadcare
  config:
    publicKey: "demopublickey"
    previewStep: true

collections:
  - name: "portfolio"
    label: "摄影作品"
    folder: "data"
    create: true
    slug: "{{slug}}"
    path: "{{slug}}.md"
    extension: "md"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "分类", name: "category", widget: "select", options: ["风光", "人像", "街拍"] }
      - { label: "图片", name: "image", widget: "image", required: false }
      - { label: "描述", name: "description", widget: "text", required: false }