backend:
  name: git-gateway
  branch: master

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "portfolio"
    label: "摄影作品"
    folder: "data"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "分类", name: "category", widget: "select", options: ["风光", "人像", "街拍"] }
      - { label: "图片路径", name: "image", widget: "string", default: "images/portfolio/" }
      - { label: "描述", name: "description", widget: "text", required: false }