    <main class="contact-page">
        <div class="contact-container">
            <div class="contact-form">
                <h2>📝 留言</h2>
                <p class="form-intro">约拍 · 合作 · 交流</p>
                <form id="contactForm" action="https://formspree.io/f/你的表单ID" method="POST">
                    <div class="form-group"><input type="text" name="name" placeholder="你的名字" required></div>
                    <div class="form-group"><input type="email" name="email" placeholder="邮箱地址" required></div>
                    <div class="form-group"><textarea name="message" rows="5" placeholder="说点什么吧..." required></textarea></div>
                    <button type="submit" class="submit-btn">发送 ✨</button>
                </form>
                <p class="form-note">✨ 24小时内回复</p>
            </div>
            <div class="contact-qrcode">
                <div class="qrcode-intro"><h2>📱 加个好友</h2><p>约拍 · 聊创作</p></div>
                <div class="qrcode-grid">
                    <div class="qrcode-item"><img src="images/qrcode/instagram.jpg" alt="Instagram"><span>📷 Instagram</span><small>日常随拍</small></div>
                    <div class="qrcode-item"><img src="images/qrcode/telegram.jpg" alt="Telegram"><span>💬 Telegram</span><small>畅聊无界</small></div>
                    <div class="qrcode-item"><img src="images/qrcode/qq.jpg" alt="QQ"><span>🐧 QQ</span><small>老派可靠</small></div>
                    <div class="qrcode-item"><img src="images/qrcode/wechat.jpg" alt="微信"><span>💚 微信</span><small>约拍深度交流</small></div>
                </div>
                <div class="email-info"><span>📧</span><a href="mailto:ztx9527@gmail.com">ztx9527@gmail.com</a><small>24h回复</small></div>
            </div>
        </div>
